<style>
.pagination{
    display: flex;
    justify-content: center;
    align-items: center;
    gap:8px;
}

.pagination button{
    padding-top: 10px;
    padding-bottom: 10px;
    padding-right: 10px;
    padding-left: 10px;
    cursor: pointer;
    background-color:rgb(216, 216, 216);
    border: none;
    border-radius: 8px;
    box-shadow: 5px 2px 10px rgba(0,0,0,0.30);
    transition: background-color 0.5s;
}
.pagination button:hover{
    background-color:rgb(233, 233, 233);
}
.pagination a:hover{
    color:blue;
    cursor: pointer;
    box-shadow: 5px 2px 10px rgba(0,0,0,0.30);
}
.stretch-container{
    display: flex;
    justify-content: center;
    align-items: center;
}
.stretch-button{
    background-color: green;
    border: none;
    padding-top: 10px;
    padding-bottom: 10px;
    padding-right: 10px;
    padding-left: 10px;   
    color: white;
    transition: padding 0.5s;
    vertical-align: middle;
}
.stretch-button:hover{
    padding: 24px 24px; 
}

.shadow-container{
    display: flex;
    justify-content: center;
    align-items: center; 
}

.shadow-button {
    background-color: #4CAF50;
    color: white;
    padding: 12px 24px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    

    box-shadow: 0 6px 0 #2e7d32;
    
    cursor: pointer;
    transition: all 0.1s ease;
    box-shadow: 4px 4px 0 #2e7d32;
}


.shadow-button:active {
    transform: translate(4px, 4px);
    box-shadow: 0px 0px 0px #2e7d32;
}


.button-container{
    display: flex;
    justify-content: center;
    gap: 16px;
}

.button-wrapper{
    border: none;
    display: flex;
    justify-content: center;
    width: 100px;

}
.button-container button{
    background-color: #4CAF50;
    padding: 10px 24px;
    color:white;
    transition: padding 0.2s;
}
.button-container button:hover{
    padding: 10px 50px;
    
}

</style>

<div class="pagination">
    <button>Back</button>
    <a>1</a>
    <a>2</a>
    <a>3</a>
    <a>4</a>
    <a>5</a>
    <button>next</button>
</div>

<div class="stretch-container">
    <button class="stretch-button">Stretch</button>
</div>
<br>
<div class="shadow-container">
    <button class="shadow-button">Click Me</button>
</div>
<br>
<div class="button-container">
    <div class="button-wrapper">
       <button class="one-button">one</button>
    </div>
    <div class="button-wrapper">
       <button class="two-button">two</button>
    </div>
    <div class="button-wrapper">
       <button class="three-button">three</button>
    </div>
</div>
