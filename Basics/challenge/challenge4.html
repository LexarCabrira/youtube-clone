<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            border: 1px solid red;
        }

        * .search-box input {
            border-radius: 8px;
            border: 1px solid rgb(94, 94, 94);
            padding: 13px 15px;
            font-size: 18px;
        }

        .search-box2 input {
            border-radius: 8px;
            border: 1px solid rgb(94, 94, 94);
            padding: 13px 20px;
            font-size: 15px;
            border-radius: 30px;
            box-shadow: 1px 1px 4px rgba(94, 94, 94, 0.50);
            border: none;
            width: 500px;

        }

        .search-box2 input::placeholder {
            color: rgb(94, 94, 94);
        }

        .search-box3 p {
            font-family: arial;
            color: rgb(94, 94, 94);
            margin-bottom: 0;
        }


        .search-box3 input {
            margin-top: 10px;
            width: 370px;
            border-radius: 8px;
            padding: 8px 15px;
            font-size: 18px;
        }

        .search-box3 .agree-button {
            background-color: rgb(0, 119, 255);
            color: white;
            border: none;
            margin-top: 20px;
            border-radius: 30px;
            font-size: 18px;
            padding: 12px 150px
        }

        .search-box4 input,
        .search-box4 img,
        .search-box4 button {
            vertical-align:middle;
        }

        .search-box4 input {
            border-radius: 8px;
            border: 1px solid rgb(94, 94, 94);
            padding: 13px 15px;
            font-size: 18px;
            border:none;
        }
        .search-box4 img{
            width: 50px;
            height: 50px;
            object-fit:cover;
            border-radius: 50%;
        }
        .search-box4 button{
            background-color: rgb(0, 119, 255);
            color:white;
            font-size: 16px;
            font-weight: bold;
            padding:10px 15px;
            border:none;
            border-radius: 30px;
        }

    </style>


</head>

<body>
    <div class="search-box"><input type="text" placeholder="Search"></div>
    <br>
    <div class="search-box2"><input type="text" placeholder="Search Google or type URL"></div>
    <br>

    <div class="search-box3">
        <p>Email</p>
        <input type="text">
        <p>By clicking Agree & Join, you agree to the Privacy Policy</p>
        <button class="agree-button">Agree & Join</button>
    </div>

    <div class="search-box4">
        <img src="/image/v1.avif" alt="">

        <input type="text" placeholder="What's Happening?">

        <button>Tweet</button>
    </div>
</body>

</html>
